# ============================================================
# Авто-конвертация изображений в WebP
# ============================================================
# Срабатывает при пуше в assets/uploads/.
# Конвертирует jpg/jpeg/png в WebP, обновляет ссылки в файлах,
# удаляет оригиналы и коммитит результат.
# ============================================================

name: Конвертация в WebP

on:
  push:
    branches: ["main"]
    paths:
      - "assets/uploads/**"

jobs:
  convert:
    if: "!contains(github.event.head_commit.message, '[webp-convert]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка cwebp
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Конвертация и замена ссылок
        run: |
          python3 << 'PYEOF'
          import os, glob, re

          upload_dir = "assets/uploads"
          skip_files = {"apple-touch-icon.png", "favicon.png", "og-image.png"}
          extensions = (".jpg", ".jpeg", ".png")
          file_patterns = ("*.md", "*.yml", "*.yaml", "*.html", "*.json")
          skip_dirs = {"_site", ".git", "node_modules"}

          # 1. Конвертируем изображения
          converted = []
          for ext in extensions:
              for filepath in glob.glob(os.path.join(upload_dir, f"*{ext}")) + glob.glob(os.path.join(upload_dir, f"*{ext.upper()}")):
                  basename = os.path.basename(filepath)
                  if basename in skip_files:
                      print(f"Пропускаю: {basename}")
                      continue
                  name = os.path.splitext(filepath)[0]
                  webp_path = name + ".webp"
                  if os.path.exists(webp_path):
                      continue
                  ret = os.system(f'cwebp -q 85 "{filepath}" -o "{webp_path}"')
                  if ret == 0 and os.path.exists(webp_path):
                      # Храним полный путь от uploads/ чтобы не зацепить файлы в других папках
                      converted.append((f"uploads/{basename}", f"uploads/{os.path.basename(webp_path)}"))
                      print(f"Конвертировано: {basename} → {os.path.basename(webp_path)}")

          if not converted:
              print("Нечего конвертировать")
              # Сигнализируем что ничего не изменилось
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("converted=0\n")
          else:
              print(f"\nКонвертировано файлов: {len(converted)}")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"converted={len(converted)}\n")

              # 2. Заменяем ссылки в файлах проекта
              for root, dirs, files in os.walk("."):
                  dirs[:] = [d for d in dirs if d not in skip_dirs]
                  for fname in files:
                      if not any(fname.endswith(p.lstrip("*")) for p in file_patterns):
                          continue
                      fpath = os.path.join(root, fname)
                      try:
                          with open(fpath, "r", encoding="utf-8") as f:
                              content = f.read()
                      except (UnicodeDecodeError, PermissionError):
                          continue

                      original = content
                      for old_name, new_name in converted:
                          content = content.replace(old_name, new_name)

                      if content != original:
                          with open(fpath, "w", encoding="utf-8") as f:
                              f.write(content)
                          print(f"Обновлены ссылки: {fpath}")

              # 3. Удаляем оригиналы
              for old_ref, _ in converted:
                  old_path = os.path.join("assets", old_ref)
                  if os.path.exists(old_path):
                      os.remove(old_path)
                      print(f"Удалён: {old_ref}")
          PYEOF

      - name: Коммит изменений
        if: env.converted != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "Авто-конвертация изображений в WebP [webp-convert]"
          git push
