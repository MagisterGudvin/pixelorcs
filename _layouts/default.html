<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ru' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% seo %}

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% feed_meta %}

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/logo.svg' | relative_url }}" type="image/svg+xml">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="32x32">
  <link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

  <!-- Sitemap -->
  <link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | relative_url }}">

  <!-- Cyrillic fonts: Oswald (display) + Literata (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <meta name="baseurl" content="{{ site.baseurl }}">
  <meta name="yandex-verification" content="7198e784108150f7" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.title }}",
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "description": "{{ site.description }}",
    "inLanguage": "ru"
  }
  </script>
</head>
<body>

  {% include header.html %}

  <main>{{ content }}</main>

  {% include footer.html %}

  <script src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
