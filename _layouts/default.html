<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ru' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% seo %}

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% feed_meta %}

  <!-- Cyrillic fonts: Oswald (display) + Literata (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.title }}",
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "description": "{{ site.description }}",
    "inLanguage": "ru"
  }
  </script>
</head>
<body>

  {% include header.html %}

  <main>{{ content }}</main>

  {% include footer.html %}

</body>
</html>
