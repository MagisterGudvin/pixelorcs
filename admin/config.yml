# ============================================================
# Sveltia CMS — конфигурация для GitHub Pages
# ============================================================
# Sveltia CMS — замена Decap CMS с лучшим UI и авторизацией.
#
# Перед использованием:
#   1. repo        → ваш GitHub-репозиторий (username/repo-name)
#   2. site_url    → URL вашего сайта
#   3. base_url    → URL вашего OAuth-прокси (см. README)
# ============================================================

backend:
  name: github
  repo: MagisterGudvin/pixelorcs          # ← замените на ваш репозиторий
  branch: main
  base_url: https://pixelorcs-auth.michaelgublin.workers.dev/  # ← URL Cloudflare Worker (см. README)

# Для локальной разработки: запустите `npx @sveltia/cms-proxy` и раскомментируйте:
# local_backend: true

# Публикация
publish_mode: editorial_workflow        # черновики → на ревью → публикация
site_url: https://MagisterGudvin.github.io/pixelorcs
display_url: https://MagisterGudvin.github.io/pixelorcs

# Медиа
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Локализация
locale: "ru"

# Превью
show_preview_links: true

# Слаги
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# ============================================================
# Коллекции
# ============================================================
collections:

  # --- Статьи ---
  - name: "posts"
    label: "Статьи"
    label_singular: "Статью"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title", "category"]
    view_filters:
      - label: "Аналитика"
        field: category
        pattern: "analytics"
      - label: "Обзоры"
        field: category
        pattern: "reviews"
      - label: "Превью"
        field: category
        pattern: "previews"
      - label: "Индустрия"
        field: category
        pattern: "industry"
      - label: "Гейм-дизайн"
        field: category
        pattern: "game-design"
      - label: "Культура"
        field: category
        pattern: "culture"
      - label: "Интервью"
        field: category
        pattern: "interviews"
      - label: "Гайды"
        field: category
        pattern: "guides"
    summary: "{{title}} — {{category}} · {{year}}-{{month}}-{{day}}"
    fields:
      - label: "Макет"
        name: "layout"
        widget: "hidden"
        default: "post"

      - label: "Заголовок"
        name: "title"
        widget: "string"
        hint: "Основной заголовок статьи"

      - label: "Описание (SEO)"
        name: "description"
        widget: "string"
        hint: "Краткое описание для поисковиков и соцсетей (до 160 символов)"
        pattern: ['.{0,160}', "Не больше 160 символов"]

      - label: "Дата публикации"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Категория (slug)"
        name: "category"
        widget: "string"
        hint: "Латинский slug категории из Настроек (analytics, reviews, previews, industry, game-design, culture, interviews, guides)"

      - label: "Цвет тега"
        name: "tag_color"
        widget: "select"
        required: false
        default: ""
        options:
          - label: "Зелёный (по умолчанию)"
            value: ""
          - label: "Красный"
            value: "red"
        hint: "Цвет плашки категории на карточке"

      - label: "Время чтения (мин)"
        name: "read_time"
        widget: "number"
        value_type: "int"
        min: 1
        max: 60
        default: 7

      - label: "Обложка (OG-изображение)"
        name: "image"
        widget: "image"
        required: false
        hint: "Рекомендуемый размер: 1200×630 px"
        media_folder: "/assets/uploads"

      - label: "Текст статьи"
        name: "body"
        widget: "markdown"
        hint: "Поддерживаются заголовки, списки, цитаты, изображения"

  # --- Настройки ---
  - name: "settings"
    label: "Настройки"
    delete: false
    editor:
      preview: false
    files:
      - label: "Общие настройки"
        name: "general"
        file: "_data/settings.yml"
        fields:
          - label: "Название сайта"
            name: "title"
            widget: "string"
            default: "PIXELORCS"

          - label: "Описание сайта"
            name: "description"
            widget: "text"

          - label: "Категории"
            name: "categories"
            widget: "list"
            label_singular: "Категорию"
            hint: "Категории отображаются в навигации сайта. Slug используется в URL и при создании статей."
            fields:
              - label: "Название (рус)"
                name: "name"
                widget: "string"
                hint: "Отображаемое название (например: Аналитика)"
              - label: "Slug (лат)"
                name: "slug"
                widget: "string"
                hint: "Латинский идентификатор для URL (например: analytics). Только строчные буквы и дефис."

          - label: "Hero — тег"
            name: "hero_tag"
            widget: "string"
            default: "Главное"
            hint: "Маленькая плашка над заголовком (например «Главное»)"

          - label: "Hero — строка 1"
            name: "hero_title_1"
            widget: "string"
            default: "Играем."

          - label: "Hero — строка 2 (акцентная)"
            name: "hero_title_2"
            widget: "string"
            default: "Анализируем."
            hint: "Эта строка выделяется цветом"

          - label: "Hero — строка 3"
            name: "hero_title_3"
            widget: "string"
            default: "Пишем."

          - label: "Hero — подзаголовок"
            name: "hero_subtitle"
            widget: "text"

          - label: "О проекте — заголовок"
            name: "about_title"
            widget: "string"

          - label: "О проекте — текст (абзац 1)"
            name: "about_text_1"
            widget: "text"

          - label: "О проекте — текст (абзац 2)"
            name: "about_text_2"
            widget: "text"

          - label: "О проекте — статистика"
            name: "about_stats"
            widget: "list"
            label_singular: "Показатель"
            max: 4
            fields:
              - label: "Число"
                name: "number"
                widget: "string"
                hint: "Например: 200+, 15K, 0"
              - label: "Подпись"
                name: "label"
                widget: "string"
                hint: "Например: Статей, Читателей, Рекламы"

          - label: "Бегущая строка"
            name: "ticker"
            widget: "list"
            label_singular: "Новость"
            fields:
              - label: "Текст"
                name: "text"
                widget: "string"
              - label: "Ссылка"
                name: "link"
                widget: "string"
                required: false
                hint: "Ссылка на статью: /category-slug/post-slug/ (например /culture/retro-consoles/). Или внешний URL."
              - label: "Горячая новость"
                name: "hot"
                widget: "boolean"
                default: false

          - label: "Текст в подвале"
            name: "footer_text"
            widget: "string"
            default: "Сделано с любовью к играм."
